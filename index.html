<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  
  <title>Cachorro pet</title>
  
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="container">
    <header>
      <div class="header-icon">🐾</div>
      <h1>Cachorro Pet</h1>
      <p class="subtitle">Registre e gerencie seus cãezinhos</p>
    </header>

    <section class="card form-card">
      <h2 id="form-title">Novo registro</h2>

      <form id="entry-form">
        <input type="hidden" id="entry-id" />

        <div class="field-group">
          <div class="field">
            <label for="raca">Raça</label>
            <input type="text" id="raca" placeholder="Ex: Labrador, Golden..." required />
          </div>

          <div class="field">
            <label for="tamanho">Tamanho</label>
            <input type="text" id="tamanho" placeholder="Ex: Pequeno, Médio, Grande..." required />
          </div>

          <div class="field">
            <label for="cor">Cor</label>
            <input type="text" id="cor" placeholder="Ex: Caramelo, Preto..." required />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <span class="btn-icon">✦</span> Salvar
          </button>
          <button type="button" id="cancel-edit" class="btn btn-secondary hidden">
            Cancelar edição
          </button>
        </div>
      </form>

      <p id="message" class="message"></p>
    </section>

    <section class="card list-card">
      <div class="list-header">
        <h2>Registros</h2>
        <button id="reload-btn" class="btn btn-ghost">
          <span>↻</span> Atualizar
        </button>
      </div>

      <div id="entries-list"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
